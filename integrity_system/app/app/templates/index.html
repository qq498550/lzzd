<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>廉政意见智答系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .header p { font-size: 1.1em; opacity: 0.9; }
        .card { background: white; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); padding: 30px; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        .form-group input, .form-group select { width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; transition: border-color 0.3s; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #667eea; }
        .btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 14px 30px; font-size: 16px; border-radius: 8px; cursor: pointer; width: 100%; transition: transform 0.2s, box-shadow 0.2s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }
        .btn:active { transform: translateY(0); }
        .result-section { display: none; }
        .result-section.active { display: block; }
        .result-title { font-size: 1.3em; color: #667eea; margin-bottom: 15px; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
        .answer-box { background: #f8f9fa; border-left: 4px solid #667eea; padding: 20px; border-radius: 8px; margin-bottom: 20px; line-height: 1.8; font-size: 16px; }
        .conclusion-badge { display: inline-block; padding: 8px 20px; border-radius: 20px; font-weight: bold; margin-bottom: 15px; }
        .conclusion-ok { background: #d4edda; color: #155724; }
        .conclusion-warn { background: #fff3cd; color: #856404; }
        .conclusion-danger { background: #f8d7da; color: #721c24; }
        .record-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .record-table th, .record-table td { padding: 12px; text-align: left; border-bottom: 1px solid #e0e0e0; }
        .record-table th { background: #f8f9fa; font-weight: bold; color: #333; }
        .record-table tr:hover { background: #f8f9fa; }
        .status-tag { padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .status-passed { background: #d4edda; color: #155724; }
        .status-active { background: #f8d7da; color: #721c24; }
        .status-processing { background: #fff3cd; color: #856404; }
        .loading { display: none; text-align: center; padding: 20px; }
        .loading.active { display: block; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .admin-link { text-align: center; margin-top: 20px; }
        .admin-link a { color: white; text-decoration: underline; opacity: 0.8; }
        .no-record { text-align: center; color: #999; padding: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛡️ 廉政意见智答系统</h1>
            <p>智能检索 · 规则匹配 · 标准答复</p>
        </div>

        <!-- 查询表单 -->
        <div class="card">
            <form id="queryForm">
                <div class="form-group">
                    <label for="name">姓名 *</label>
                    <input type="text" id="name" name="name" required placeholder="请输入查询人姓名">
                </div>
                <div class="form-group">
                    <label for="matterType">事项类型 *</label>
                    <select id="matterType" name="matterType">
                        <option value="干部选拔任用">干部选拔任用</option>
                        <option value="表彰奖励">表彰奖励</option>
                        <option value="职级晋升">职级晋升</option>
                        <option value="交流任职">交流任职</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="currentDate">当前日期（可选，默认今天）</label>
                    <input type="date" id="currentDate" name="currentDate">
                </div>
                <button type="submit" class="btn">🔍 开始智能查询</button>
            </form>
        </div>

        <!-- 加载动画 -->
        <div class="card loading" id="loading">
            <div class="spinner"></div>
            <p>正在智能分析中...</p>
        </div>

        <!-- 查询结果 -->
        <div class="card result-section" id="resultSection">
            <h2 class="result-title">📋 智答助手 - 生成答复</h2>
            
            <div id="conclusionBadge"></div>
            
            <div class="answer-box" id="generatedAnswer"></div>
            
            <div style="margin-top: 20px;">
                <strong>匹配模板：</strong> <span id="matchedTemplate"></span><br>
                <strong>结论：</strong> <span id="conclusionText"></span>
            </div>

            <h2 class="result-title" style="margin-top: 30px;">📊 检索智答 - 详细记录</h2>
            <div id="recordsContainer"></div>
        </div>

        <div class="admin-link">
            <a href="/admin">进入管理后台 →</a>
        </div>
    </div>

    <script>
        document.getElementById('queryForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const matterType = document.getElementById('matterType').value;
            const currentDate = document.getElementById('currentDate').value;
            
            if (!name) {
                alert('请输入姓名');
                return;
            }
            
            // 显示加载动画
            document.getElementById('loading').classList.add('active');
            document.getElementById('resultSection').classList.remove('active');
            
            try {
                const payload = {
                    name: name,
                    matter_type: matterType
                };
                if (currentDate) {
                    payload.current_date = currentDate;
                }
                
                const response = await fetch('/api/query/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (!response.ok) {
                    throw new Error('查询失败');
                }
                
                const data = await response.json();
                displayResults(data);
                
            } catch (error) {
                alert('查询出错：' + error.message);
            } finally {
                document.getElementById('loading').classList.remove('active');
            }
        });
        
        function displayResults(data) {
            const resultSection = document.getElementById('resultSection');
            const conclusionBadge = document.getElementById('conclusionBadge');
            const generatedAnswer = document.getElementById('generatedAnswer');
            const matchedTemplate = document.getElementById('matchedTemplate');
            const conclusionText = document.getElementById('conclusionText');
            const recordsContainer = document.getElementById('recordsContainer');
            
            // 设置结论徽章
            let badgeClass = 'conclusion-ok';
            if (data.conclusion.includes('不宜')) {
                badgeClass = 'conclusion-danger';
            } else if (data.conclusion.includes('暂缓')) {
                badgeClass = 'conclusion-warn';
            }
            conclusionBadge.className = `conclusion-badge ${badgeClass}`;
            conclusionBadge.textContent = data.conclusion;
            
            // 显示生成的答复
            generatedAnswer.textContent = data.generated_answer;
            
            // 显示模板信息
            matchedTemplate.textContent = `${data.matched_template} (${data.template_code})`;
            conclusionText.textContent = data.conclusion;
            
            // 显示检索记录
            if (data.search_results.length === 0) {
                recordsContainer.innerHTML = '<div class="no-record">✅ 未查询到任何违纪、违规或信访举报记录</div>';
            } else {
                let tableHtml = '<table class="record-table"><thead><tr>' +
                    '<th>类型</th><th>姓名</th><th>问责情况</th><th>时间</th>' +
                    '<th>影响期状态</th><th>事由</th></tr></thead><tbody>';
                
                data.search_results.forEach(record => {
                    let typeLabel = record.record_type === 'discipline' ? '违纪' : 
                                   (record.record_type === 'violation' ? '违规' : '信访');
                    let statusClass = record.influence_status === '已过影响期' ? 'status-passed' :
                                     (record.influence_status === '尚在影响期内' ? 'status-active' : 'status-processing');
                    let dateStr = record.accountability_date ? record.accountability_date : '无';
                    
                    tableHtml += `<tr>
                        <td>${typeLabel}</td>
                        <td>${record.name}</td>
                        <td>${record.accountability_type || '-'}</td>
                        <td>${dateStr}</td>
                        <td><span class="status-tag ${statusClass}">${record.influence_status}</span></td>
                        <td>${record.reason || '-'}</td>
                    </tr>`;
                });
                
                tableHtml += '</tbody></table>';
                recordsContainer.innerHTML = tableHtml;
            }
            
            resultSection.classList.add('active');
        }
    </script>
</body>
</html>
